# Migration Job — runs `node scripts/migrate-prod.mjs` against the
# in-cluster Postgres. Apply this manifest after every code deploy
# that includes new migrations. Idempotent: the migrate script
# tracks applied migrations in `__drizzle_migrations` and skips
# already-applied ones.
#
# To re-run after a previous Job exists, delete it first:
#   kubectl -n reincarnated delete job reincarnated-migrate
# then re-apply this manifest.
apiVersion: batch/v1
kind: Job
metadata:
  name: reincarnated-migrate
  namespace: reincarnated
  labels:
    app.kubernetes.io/part-of: reincarnated-rpg
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400 # auto-clean a day after success
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: reincarnated-rpg
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: reincarnated-rpg:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "scripts/migrate-prod.mjs"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reincarnated-app-secrets
                  key: DATABASE_URL
            - name: DATABASE_URL_DIRECT
              valueFrom:
                secretKeyRef:
                  name: reincarnated-app-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
