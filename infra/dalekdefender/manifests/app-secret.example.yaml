# EXAMPLE secret manifest. DO NOT commit the real one.
#
# Recipe:
#   1. Copy this file to app-secret.yaml (in the same dir).
#   2. Fill in real values (base64 NOT required — k8s accepts
#      stringData and base64-encodes for you).
#   3. Apply via:
#        ssh dd 'sudo -n kubectl apply -f -' < app-secret.yaml
#   4. (.gitignore covers app-secret.yaml so it stays local.)
#
# To rotate a single key without re-applying the whole file:
#   ssh dd 'sudo -n kubectl -n reincarnated patch secret \
#     reincarnated-app-secrets \
#     --patch-file=/dev/stdin' <<EOF
#   stringData:
#     ANTHROPIC_API_KEY: sk-ant-NEW_VALUE
#   EOF
apiVersion: v1
kind: Secret
metadata:
  name: reincarnated-app-secrets
  namespace: reincarnated
  labels:
    app.kubernetes.io/part-of: reincarnated-rpg
    app.kubernetes.io/component: web
type: Opaque
stringData:
  # Required: cluster-internal DB URL. The Postgres pod is in the
  # same namespace, so DNS name + service port works.
  DATABASE_URL: "postgres://reincarnated:REPLACE_WITH_REAL_PASSWORD@reincarnated-postgres.reincarnated.svc.cluster.local:5432/reincarnated"

  # Required: 32+ random bytes for jose HS256 cookie auth. Generate
  # fresh — do NOT reuse the dev one. Example:
  #   openssl rand -base64 32
  SESSION_SECRET: "REPLACE_WITH_OPENSSL_RAND_BASE64_32"

  # AI narrator config. Pick ONE of the following blocks:
  #
  # === Block A: Anthropic ===
  # Set NARRATOR=remote and AI_PROVIDER=anthropic in the deployment
  # env (already so) and set ANTHROPIC_API_KEY here.
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_WITH_REAL_KEY"

  # === Block B: MiniMax (cheaper / faster) ===
  # Already set: AI_PROVIDER=openai-compatible in deployment env.
  # Fill these and the orchestrator will route the free-text path
  # through MiniMax. Verb-button presets always use the
  # deterministic TemplateNarrator regardless.
  OPENAI_API_KEY: "sk-cp-REPLACE_WITH_REAL_KEY"
  OPENAI_BASE_URL: "https://api.minimax.io/v1"
  OPENAI_MODEL: "MiniMax-M2.7-highspeed"

  # Voyage embeddings for cross-run memory. When unset, the
  # episodic-memory layer falls back to a deterministic SHA-256
  # mock vector — works for development but world-memory across
  # runs won't be semantically meaningful.
  VOYAGE_API_KEY: "pa-REPLACE_WITH_REAL_KEY"

  # Optional: Sentry observability. When unset, captureException()
  # is a strict no-op. Set this when you want server errors to
  # land in Sentry's UI.
  SENTRY_DSN: ""
