services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: reincarnated-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: reincarnated
      POSTGRES_PASSWORD: reincarnated
      POSTGRES_DB: reincarnated
    ports:
      - "5433:5432"
    volumes:
      - reincarnated-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reincarnated -d reincarnated"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reincarnated-pgdata:
