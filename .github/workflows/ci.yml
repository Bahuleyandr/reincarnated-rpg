name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: reincarnated
          POSTGRES_PASSWORD: reincarnated
          POSTGRES_DB: reincarnated_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reincarnated -d reincarnated_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://reincarnated:reincarnated@127.0.0.1:5432/reincarnated_test
      SESSION_SECRET: ci-session-secret-ci-session-secret-32
      NARRATOR: template
      EMBEDDINGS: mock
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run content:validate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run test:integration
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
