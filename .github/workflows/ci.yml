name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: reincarnated
          POSTGRES_PASSWORD: reincarnated
          POSTGRES_DB: reincarnated_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reincarnated -d reincarnated_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://reincarnated:reincarnated@127.0.0.1:5432/reincarnated_test
      SESSION_SECRET: ci-session-secret-ci-session-secret-32
      NARRATOR: template
      EMBEDDINGS: mock
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run content:validate
      - run: npm run test:risk
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run test:integration
      - run: npm run build

      # POLISH_PLAN 0b.4 — Playwright happy-path smoke. Boots
      # `next start` against the just-built bundle on port 3100,
      # then drives the deterministic happy-path spec.
      - run: npx playwright install --with-deps chromium
      - name: Boot next start
        run: |
          NODE_ENV=test \
          DATABASE_URL=postgres://reincarnated:reincarnated@127.0.0.1:5432/reincarnated_test \
          SESSION_SECRET=ci-session-secret-ci-session-secret-32 \
          NARRATOR=template EMBEDDINGS=mock NEXT_TELEMETRY_DISABLED=1 \
          npx next start -p 3100 &
          for _ in $(seq 1 30); do
            curl -fsS http://127.0.0.1:3100/api/health >/dev/null && exit 0
            sleep 1
          done
          echo "next start never came up"; exit 1
      - name: Playwright e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: npx playwright test --reporter=line

      - run: npm audit --omit=dev --audit-level=high
