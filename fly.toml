# fly.toml for reincarnated-rpg v0.1.0
#
# One small VM, Neon Postgres + pgvector for the DB. Secrets are managed
# via `fly secrets set` (see deploy notes below). Single region for v0.1
# (Bombay — IAD/SFO/EWR are alternates depending on player geography).

app = "reincarnated-rpg"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # NARRATOR is set via fly secrets so the same image can run with
  # template (no API cost) for canary / debug, or remote in prod.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  # Two probes:
  # - /api/health is the cheap liveness probe (process is up, no
  #   downstream checks). Used for the keep-alive / restart trigger.
  # - /api/ready does real readiness checks (DB, pgvector, content,
  #   Anthropic). Used as the deploy gate so a misconfigured release
  #   rolls back automatically before traffic shifts to it.
  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

  [[http_service.checks]]
    grace_period = "30s"
    interval = "60s"
    method = "GET"
    path = "/api/ready"
    timeout = "8s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

# Deploy recipe (run from a clean checkout):
#
#   1. fly launch --copy-config --no-deploy   # one-time; creates the app
#   2. fly secrets set \
#        DATABASE_URL='postgresql://<user>:<pass>@<neon-host>/<db>?sslmode=require' \
#        SESSION_SECRET="$(openssl rand -base64 32)" \
#        ANTHROPIC_API_KEY=sk-ant-... \
#        VOYAGE_API_KEY=pa-... \
#        NARRATOR=remote
#   3. fly deploy
#   4. fly ssh console -C "node scripts/migrate-prod.mjs"  # apply migrations
#   5. fly ssh console -C "node scripts/seed-runtime.mjs"  # load content
#   6. fly ssh console -C "node scripts/smoke.mjs http://127.0.0.1:3000"
#
# To roll forward: `git tag v0.1.X && git push --tags && fly deploy`.
# To roll back: `fly releases list` then `fly deploy --image <prev>`.
